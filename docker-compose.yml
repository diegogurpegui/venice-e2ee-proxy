# From this directory: docker compose up -d --build
# Copy .env.example to .env and set VENICE_API_KEY.
# Pin VENICE_PROXY_REF to a branch, tag, or full commit SHA (default is a fixed commit on main).

services:
  venice-e2ee-proxy:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VENICE_PROXY_REPO: ${VENICE_PROXY_REPO:-https://github.com/diegogurpegui/venice-e2ee-proxy.git}
        VENICE_PROXY_REF: ${VENICE_PROXY_REF:-9edb944bd478b66460994a40b279c2e4f2200e09}
    container_name: venice-e2ee-proxy
    env_file:
      - .env
    environment:
      HOST: "0.0.0.0"
      PORT: ${PORT:-3000}
    ports:
      - "127.0.0.1:${PORT:-3000}:${PORT:-3000}"
    restart: unless-stopped
